name: Android CI/CD

"on":
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle 8.4
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.4'

      - name: Generate Gradle Wrapper
        run: |
          gradle wrapper --gradle-version 8.4 --distribution-type all
          chmod +x gradlew

      - name: Build and capture ALL output
        run: ./gradlew kspDebugKotlin 2>&1 | tee /tmp/full.log || true

      - name: Show error lines
        run: grep "^e:" /tmp/full.log || echo "No e: lines"

      - name: Upload full raw log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: full-log-${{ github.run_number }}
          path: /tmp/full.log
          retention-days: 3
