name: Android CI/CD

"on":
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle 8.4
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.4'

      - name: Generate Gradle Wrapper
        run: |
          gradle wrapper --gradle-version 8.4 --distribution-type all
          chmod +x gradlew

      - name: Compile only (show full errors)
        run: |
          ./gradlew kspDebugKotlin 2>&1 | tee /tmp/build.log || true
          echo "=== ALL E: LINES ==="
          grep "^e:" /tmp/build.log || echo "No e: lines found"
          echo "=== ERROR LINES ==="
          grep -i "error" /tmp/build.log | grep -v "^w:" | grep -v "stacktrace" | head -50

      - name: Build Debug APK
        run: ./gradlew assembleDebug 2>&1 | tee /tmp/apk.log
        continue-on-error: true

      - name: Upload full logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs-${{ github.run_number }}
          path: /tmp/*.log
          retention-days: 3
