name: Android CI/CD

"on":
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle 8.4
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.4'

      - name: Generate Gradle Wrapper
        run: |
          gradle wrapper --gradle-version 8.4 --distribution-type all
          chmod +x gradlew

      - name: Build with full debug output
        run: |
          ./gradlew kspDebugKotlin --debug 2>&1 | grep -E "^\[ERROR\]|error:|\.kt:[0-9]+.*error" | grep -v "^w:" | grep -v "Download" | grep -v "gradle" | head -60 | tee /tmp/errors.txt || true
          cat /tmp/errors.txt

      - name: Upload error log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug-errors-${{ github.run_number }}
          path: /tmp/errors.txt
          retention-days: 3
